<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Aerion Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        #map {
            height: 100%;
            width: 100%;
            background: #2b2b2b;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var imageWidth = 1652;
        var imageHeight = 952;
        var bounds = [[0, 0], [imageHeight, imageWidth]];

        var map = L.map('map', {
            crs: L.CRS.Simple,
            zoomControl: false,
            scrollWheelZoom: false,
            doubleClickZoom: false,
            touchZoom: false,
            boxZoom: false,
            keyboard: false,
            zoom: 0.7,
            minZoom: 0.7,
            maxZoom: 0.7
        });

        L.imageOverlay('Aerion.jpg', bounds).addTo(map);
        map.setView([imageHeight / 2, imageWidth / 2], 0.7);

        // Markers
        L.marker([476, 826]).addTo(map).bindPopup('Center');
    </script>
</body>
</html>
