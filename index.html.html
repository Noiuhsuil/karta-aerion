<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Карта мира Аэрион</title>
    <!-- Подключаем стили Leaflet (обязательно) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Убираем отступы и делаем карту на весь экран */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        #map {
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Подключаем библиотеку Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Сам скрипт для карты -->
    <script>
        // Создаём карту в режиме "картинка"
        var map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: 0.5,
            maxZoom: 4
        });

        // Размеры вашей картинки (1652x952)
        var bounds = [[0, 0], [952, 1652]];

        // Загружаем картинку (имя файла должно точно совпадать)
        L.imageOverlay('Aerion.jpg', bounds).addTo(map);

        // Подгоняем масштаб под картинку
        map.fitBounds(bounds);

        // Добавляем тестовую метку в центр (можете удалить или заменить)
        L.marker([476, 826]).addTo(map).bindPopup('Добро пожаловать в Аэрион!');
    </script>
</body>
</html>
